<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Content">
  <title>Content</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="92%" y2="100%">
      <stop offset="0%" stop-color="#B79DFB"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="lift" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#3A1D7A" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <g transform="translate(64,64)" filter="url(#lift)">
    <!-- Page -->
    <rect x="-40" y="-46" width="80" height="92" rx="9" fill="#ffffff"/>

    <!-- Hero section -->
    <rect x="-30" y="-37" width="60" height="24" rx="4" fill="#5FC8F5"/>
    <circle cx="18" cy="-29" r="5" fill="#FFE08A"/>

    <!-- Text lines -->
    <line x1="-30" y1="-5" x2="16" y2="-5" stroke="#9FB6CC" stroke-width="5" stroke-linecap="round"/>
    <line x1="-30" y1="5" x2="26" y2="5" stroke="#CBD8E6" stroke-width="4.5" stroke-linecap="round"/>

    <!-- Content blocks -->
    <rect x="-30" y="15" width="27" height="23" rx="3" fill="#FFC24D"/>
    <rect x="3" y="15" width="27" height="23" rx="3" fill="#3FD8B4"/>
  </g>
</svg>
